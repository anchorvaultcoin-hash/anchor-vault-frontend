<style>
:root{
  --bg:#0b0d11;
  --bg2:#181e2c;
  --bg3:#0f1318;
  --gold:#d4a843;
  --gold2:#b8911e;
  --accent:#f97316;
  --accent2:#fdba74;
  --text:#e2e8f0;
  --text2:#94a3b8;
  --text3:#7c8aa0;
  --border:#2a3347;
  --maxw:1100px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;line-height:1.6;overflow-x:hidden;position:relative}
.mono{font-family:'JetBrains Mono',ui-monospace,Menlo,Consolas,monospace}
a{color:var(--gold);text-decoration:none;transition:color .2s}
a:hover{color:var(--accent2)}
.container{max-width:var(--maxw);margin:0 auto;padding:0 20px;position:relative;z-index:2}
#coinRain{position:fixed;inset:0;width:100%;height:100%;pointer-events:none;z-index:1;opacity:.45}
header{border-bottom:1px solid var(--border);padding:13px 0;position:sticky;top:0;background:rgba(11,13,17,.92);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);z-index:50}
header .container{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px}
.logo{display:flex;align-items:center;gap:10px}
.logo img{width:38px;height:38px;border-radius:50%;animation:float 6s ease-in-out infinite;filter:drop-shadow(0 2px 8px rgba(212,168,67,.35))}
.logo .brand{font-weight:700;font-size:1.05rem;letter-spacing:.3px}
.logo .brand small{color:var(--gold);font-size:.95rem}
header nav{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.nav-btn{padding:7px 14px;border:1px solid var(--border);border-radius:7px;font-size:.82rem;font-weight:600;color:var(--text);background:transparent;transition:.2s;cursor:pointer;display:inline-flex;align-items:center;gap:6px;text-decoration:none}
.nav-btn:hover{border-color:var(--gold);color:var(--gold)}
.nav-btn.primary{border-color:var(--gold);background:linear-gradient(135deg,var(--gold),var(--gold2));color:var(--bg)}
.nav-btn.primary:hover{filter:brightness(1.1);color:var(--bg)}
.lang-select{padding:7px 10px;border-radius:7px;background:var(--bg2);color:var(--text);border:1px solid var(--border);cursor:pointer;font-size:.82rem;outline:none}
.lang-select:hover{border-color:var(--gold)}
.hero{min-height:88vh;display:flex;align-items:center;text-align:center;padding:50px 0;position:relative}
.hero::before{content:"";position:absolute;top:0;left:50%;transform:translateX(-50%);width:620px;height:620px;background:radial-gradient(circle,rgba(212,168,67,.16),transparent 70%);pointer-events:none;z-index:0}
.coin-container{width:220px;height:220px;margin:0 auto 25px;position:relative;z-index:2}
.coin-container .coin{width:100%;height:100%;object-fit:contain;border-radius:50%;animation:float 7s ease-in-out infinite;filter:drop-shadow(0 18px 38px rgba(0,0,0,.6)) drop-shadow(0 0 24px rgba(212,168,67,.35));transition:transform .4s ease}
.coin-container:hover .coin{transform:scale(1.04) rotate(-3deg)}
.hero h1{font-size:clamp(1.7rem,4vw,2.7rem);font-weight:800;line-height:1.2;margin-bottom:14px;letter-spacing:-.5px}
.hero h1 .gold{color:var(--gold)}
.hero p{color:var(--text2);max-width:720px;margin:0 auto 25px;font-size:1.02rem}
.btn{padding:13px 30px;background:linear-gradient(135deg,var(--gold),var(--gold2));color:var(--bg);border-radius:8px;font-weight:700;font-size:.98rem;border:0;cursor:pointer;transition:.2s;display:inline-flex;align-items:center;gap:8px;box-shadow:0 6px 20px rgba(212,168,67,.28);text-decoration:none}
.btn:hover{filter:brightness(1.1);transform:translateY(-2px);box-shadow:0 10px 28px rgba(212,168,67,.45);color:var(--bg)}
.btn.ghost{background:transparent;color:var(--text);border:1px solid var(--border);box-shadow:none}
.btn.ghost:hover{border-color:var(--gold);color:var(--gold);background:rgba(212,168,67,.06);transform:translateY(-2px)}
.hero .btn-row{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin-bottom:14px}
.hero .compat{font-size:.8rem;color:var(--text3);margin-top:8px}
section{padding:65px 0;position:relative;z-index:2}
section h2{text-align:center;font-size:clamp(1.4rem,3vw,2rem);margin-bottom:45px;font-weight:700;letter-spacing:-.3px}
section h2 .gold{color:var(--gold)}
.grid{display:grid;gap:22px}
.grid3{grid-template-columns:repeat(auto-fit,minmax(280px,1fr))}
.grid4{grid-template-columns:repeat(auto-fit,minmax(220px,1fr))}
.card{background:rgba(24,30,44,.78);border:1px solid var(--border);border-radius:12px;padding:26px 22px;transition:.2s;backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px);position:relative}
.card:hover{border-color:var(--gold);transform:translateY(-3px);box-shadow:0 12px 30px rgba(0,0,0,.4)}
.card .icon{width:46px;height:46px;border-radius:10px;background:rgba(212,168,67,.12);display:flex;align-items:center;justify-content:center;margin-bottom:13px;font-size:1.4rem}
.card h3{font-size:1.05rem;margin-bottom:6px;font-weight:700}
.card p{color:var(--text2);font-size:.88rem;line-height:1.55}
.step-num{font-size:3.6rem;font-weight:900;color:rgba(212,168,67,.13);position:absolute;top:10px;right:18px;line-height:1}
.stat{text-align:center;padding:22px}
.stat .num{font-size:2.3rem;font-weight:800;color:var(--gold);line-height:1.1}
.stat .label{color:var(--text2);font-size:.83rem;margin-top:6px}
.cta{background:linear-gradient(180deg,transparent,rgba(212,168,67,.07),transparent);text-align:center}
.cta h2{margin-bottom:8px}
.cta .btn-row{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin-top:18px}
.cta .footnote{font-size:.8rem;color:var(--text3);margin-top:14px}
footer{border-top:1px solid var(--border);padding:25px 0;color:var(--text3);font-size:.82rem;position:relative;z-index:2;background:rgba(11,13,17,.85)}
footer .container{display:flex;flex-direction:column;gap:12px;align-items:center;text-align:center}
footer .flinks{display:flex;gap:18px;flex-wrap:wrap;justify-content:center}
footer .flinks a{color:var(--text2)}
footer .flinks a:hover{color:var(--gold)}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-18px)}}
@media(prefers-reduced-motion:reduce){.logo img,.coin-container .coin{animation:none}#coinRain{display:none}}
@media(max-width:768px){
  header .container{flex-direction:column;align-items:stretch}
  header nav{justify-content:center}
  .nav-btn{padding:6px 10px;font-size:.78rem}
  .hero{min-height:auto;padding:40px 0}
  .coin-container{width:160px;height:160px}
  section{padding:42px 0}
  section h2{margin-bottom:28px}
  #coinRain{opacity:.3}
  .step-num{font-size:2.6rem}
}
</style>
</head>

<header>

  function setGold(id, plain, accent){
    const el = document.getElementById(id);
    if(!el) return;
    el.replaceChildren();
    if(plain) el.appendChild(document.createTextNode(plain));
    if(accent){
      const s = document.createElement('span');
      s.className = 'gold';
      s.textContent = accent;
      el.appendChild(s);
    }
  }
  function setText(id, txt){
    const el = document.getElementById(id);
    if(el) el.textContent = txt;
  }

  function applyLang(code){
    const t = LANG[code];
    if(!t) return;
    document.documentElement.lang = code === 'zh' ? 'zh' : (code === 'en' ? 'en' : 'ru');

    // Header
    const navVaultSpan = document.querySelector('#navBtnVault span');
    if(navVaultSpan) navVaultSpan.textContent = t.navBtnVault;

    // Hero
    setGold('heroTitle', t.heroTitle1 + ' ', t.heroTitle2);
    setText('heroDesc', t.heroDesc);
    setText('heroBtn', t.heroBtn);
    setText('heroCompat', t.heroCompat);

    // How
    setGold('howTitle', t.howTitle1, t.howTitle2);
    setText('step1Title', t.step1Title); setText('step1Desc', t.step1Desc);
    setText('step2Title', t.step2Title); setText('step2Desc', t.step2Desc);
    setText('step3Title', t.step3Title); setText('step3Desc', t.step3Desc);

    // Features
    setGold('featuresTitle', t.featuresTitle1, t.featuresTitle2);
    setText('feat1Title', t.feat1Title); setText('feat1Desc', t.feat1Desc);
    setText('feat2Title', t.feat2Title); setText('feat2Desc', t.feat2Desc);
    setText('feat3Title', t.feat3Title); setText('feat3Desc', t.feat3Desc);
    setText('feat4Title', t.feat4Title); setText('feat4Desc', t.feat4Desc);

    // Who
    setGold('whoTitle', t.whoTitle1, t.whoTitle2);
    setText('whoDesc', t.whoDesc);
    setText('who1', t.who1); setText('who1desc', t.who1desc);
    setText('who2', t.who2); setText('who2desc', t.who2desc);
    setText('who3', t.who3); setText('who3desc', t.who3desc);

    // Security
    setGold('secTitle', t.secTitle1, t.secTitle2);
    setText('sec1', t.sec1); setText('sec2', t.sec2);
    setText('sec3', t.sec3); setText('sec4', t.sec4);

    // CTA
    setText('ctaTitle', t.ctaTitle);
    setText('ctaDesc', t.ctaDesc);
    setText('ctaBtn', t.ctaBtn);
    setText('ctaFootnote', t.ctaFootnote);

    // Footer
    setText('fLinkVault', t.fLinkVault);
    setText('fLinkContract', t.fLinkContract);
    setText('fLinkLicense', t.fLinkLicense);
    setText('fPatent', t.fPatent);
  }

  // Определить язык: ?lang=xx > localStorage > navigator
  function detectLang(){
    try{
      const u = new URLSearchParams(window.location.search);
      const qp = u.get('lang');
      if(qp && Object.prototype.hasOwnProperty.call(LANG, qp)) return qp;
      const saved = localStorage.getItem('av_lang');
      if(saved && Object.prototype.hasOwnProperty.call(LANG, saved)) return saved;
    }catch(e){}
    const nav = (navigator.language || 'ru').toLowerCase().slice(0,2);
    return Object.prototype.hasOwnProperty.call(LANG, nav) ? nav : 'ru';
  }

  const langSelect = document.getElementById('langSelect');
  langSelect.addEventListener('change', function(){
    const v = this.value;
    if(Object.prototype.hasOwnProperty.call(LANG, v)){
      applyLang(v);
      try{localStorage.setItem('av_lang', v);}catch(e){}
    }
  });

  const startLang = detectLang();
  langSelect.value = startLang;
  applyLang(startLang);

  // Анимация падающих монет
  const reduced = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
  if(reduced) return;

  const canvas = document.getElementById('coinRain');
  if(!canvas || !canvas.getContext) return;
  const ctx = canvas.getContext('2d', { alpha: true });

  const coinImg = new Image();
  coinImg.decoding = 'async';
  coinImg.src = document.querySelector('.logo img').src;

  let W = 0, H = 0, dpr = 1, coins = [];
  let running = true, lastT = 0, raf = 0;

  function isMobile(){ return window.innerWidth < 768; }
  function resize(){
    dpr = Math.min(window.devicePixelRatio || 1, 2);
    W = window.innerWidth;
    H = window.innerHeight;
    canvas.width = Math.floor(W * dpr);
    canvas.height = Math.floor(H * dpr);
    canvas.style.width = W + 'px';
    canvas.style.height = H + 'px';
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  }
  function spawnCoin(initial){
    const size = 16 + Math.random() * 24;
    return {
      x: Math.random() * W,
      y: initial ? Math.random() * H : -size - Math.random() * 200,
      size: size,
      vy: 22 + Math.random() * 50,
      vx: (Math.random() - 0.5) * 18,
      rot: Math.random() * Math.PI * 2,
      vr: (Math.random() - 0.5) * 1.1,
      alpha: 0.28 + Math.random() * 0.32
    };
  }
  function initCoins(){
    const count = isMobile() ? 6 : 13;
    coins = [];
    for(let i = 0; i < count; i++) coins.push(spawnCoin(true));
  }
  function tick(t){
    if(!running){ raf = 0; return; }
    if(!lastT) lastT = t;
    let dt = (t - lastT) / 1000;
    lastT = t;
    if(dt > 0.1) dt = 0.1;
    ctx.clearRect(0, 0, W, H);
    if(coinImg.complete && coinImg.naturalWidth > 0){
      for(let i = 0; i < coins.length; i++){
        const c = coins[i];
        c.y += c.vy * dt;
        c.x += c.vx * dt;
        c.rot += c.vr * dt;
        if(c.y - c.size > H){ coins[i] = spawnCoin(false); continue; }
        ctx.save();
        ctx.globalAlpha = c.alpha;
        ctx.translate(c.x, c.y);
        ctx.rotate(c.rot);
        ctx.drawImage(coinImg, -c.size/2, -c.size/2, c.size, c.size);
        ctx.restore();
      }
    }
    raf = requestAnimationFrame(tick);
  }
  function start(){ if(raf) return; lastT = 0; running = true; raf = requestAnimationFrame(tick); }
  function stop(){ running = false; if(raf){ cancelAnimationFrame(raf); raf = 0; } }

  let resizeTm = 0;
  window.addEventListener('resize', function(){
    clearTimeout(resizeTm);
    resizeTm = setTimeout(function(){ resize(); initCoins(); }, 150);
  }, { passive: true });
  document.addEventListener('visibilitychange', function(){
    if(document.hidden) stop(); else start();
  });

  function launch(){ resize(); initCoins(); start(); }
  if(coinImg.complete && coinImg.naturalWidth > 0){ launch(); }
  else {
    coinImg.addEventListener('load', launch, { once: true });
    coinImg.addEventListener('error', function(){}, { once: true });
  }
})();
